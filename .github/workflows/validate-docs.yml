name: Validate bootstrap docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-bootstrap:
    name: Validate bootstrap structure and examples
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run bootstrap validation
        run: python scripts/validate_bootstrap.py
